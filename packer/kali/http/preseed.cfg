# packer/kali/http/preseed.cfg — Debian-installer preseed for Kali Linux.
#
# Adapted from Kali's official preseed examples
# (https://gitlab.com/kalilinux/recipes/kali-preseed-examples) and pared
# to the minimum this project needs. The installer defaults get modernised:
# UEFI-first boot, ZFS-root kept off (ext4 keeps the Packer image small),
# and the Vagrant insecure key is installed via late_command so the
# image is SSH-ready for provisioners.
#
# The literal 'BUILDONLY-will-be-rotated' password below is intentional:
# scripts/rotate-credentials.sh overwrites it with a CSPRNG-generated
# value before the image is finalised. If you see this password in a
# shipped box, the build is broken.

# ─── Locale and input ─────────────────────────────────────────────────
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# ─── Network ──────────────────────────────────────────────────────────
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string kali
d-i netcfg/get_domain string socool.local
d-i netcfg/wireless_wep string

# ─── Mirror ──────────────────────────────────────────────────────────
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/http/proxy string

# ─── Account ──────────────────────────────────────────────────────────
# Root account disabled; primary account 'vagrant' is created so Packer
# can SSH in. Password is BUILD-ONLY — rotated by rotate-credentials.sh.
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Vagrant
d-i passwd/username string vagrant
d-i passwd/user-password password BUILDONLY-will-be-rotated
d-i passwd/user-password-again password BUILDONLY-will-be-rotated
d-i user-setup/allow-password-weak boolean true

# ─── Clock and time zone ──────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

# ─── Partitioning ─────────────────────────────────────────────────────
# Whole-disk partitioning, LVM off for simplicity; ext4 root + swap.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ─── Base system ──────────────────────────────────────────────────────
d-i base-installer/kernel/image string linux-image-amd64

# ─── Package selection ────────────────────────────────────────────────
# kali-linux-default is the standard tool set; large but expected.
# For a minimal attacker, switch to kali-linux-core and layer tools.
tasksel tasksel/first multiselect standard
d-i pkgsel/include string kali-linux-default openssh-server sudo curl ca-certificates
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# ─── Boot loader (EFI) ────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# ─── Finish ──────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress note

# ─── late_command: Vagrant bootstrap ──────────────────────────────────
# Installs sudoers entry + Vagrant insecure SSH key so Packer's first
# `provisioner "shell"` block can connect. rotate-credentials.sh later
# removes the insecure key and swaps in a new Vagrant keypair.
d-i preseed/late_command string \
    in-target sh -c 'echo "vagrant ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/vagrant'; \
    in-target chmod 0440 /etc/sudoers.d/vagrant; \
    in-target install -o vagrant -g vagrant -m 0700 -d /home/vagrant/.ssh; \
    in-target sh -c 'curl -fsSL https://raw.githubusercontent.com/hashicorp/vagrant/main/keys/vagrant.pub -o /home/vagrant/.ssh/authorized_keys'; \
    in-target chown vagrant:vagrant /home/vagrant/.ssh/authorized_keys; \
    in-target chmod 0600 /home/vagrant/.ssh/authorized_keys; \
    in-target systemctl enable ssh;
